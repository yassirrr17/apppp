#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;justify-content:space-around;align-items:center;padding:8px 0 max(8px,env(safe-area-inset-bottom));background:rgba(250,248,245,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border-color);z-index:var(--z-nav);transition:transform var(--transition-normal)}
body.dark-mode #bottom-nav{background:rgba(26,24,22,0.92)}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px 12px;background:transparent;border:none;color:var(--text-tertiary);font-size:10px;font-weight:500;cursor:pointer;transition:all var(--transition-fast);flex:1;touch-action:manipulation;font-family:inherit;min-height:48px;min-width:48px}

.modal{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:flex-end;justify-content:center;z-index:var(--z-modal);opacity:0;pointer-events:none;transition:opacity var(--transition-normal)}

.modal-card{position:relative;background:var(--bg-card);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:32px 24px max(32px,env(safe-area-inset-bottom));width:100%;max-width:430px;text-align:center;transform:translateY(100%);transition:transform var(--transition-normal);z-index:1}

.modal-icon{font-size:48px;margin-bottom:16px}
.modal-card h3{font-size:var(--font-h3);font-weight:600;color:var(--text-primary);margin-bottom:8px}

#toast-container{position:fixed;top:max(20px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:var(--z-toast);display:flex;flex-direction:column;gap:8px;width:90%;max-width:380px;pointer-events:none}

.toast.warning{border-left:4px solid var(--warning)}
.toast.info{border-left:4px solid var(--accent-primary)}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-20px)}}
.privacy-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-primary);z-index:var(--z-modal);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:max(20px,env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom))}
