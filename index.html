    <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{--bg-primary:#FAF8F5;--bg-secondary:#FFFFFF;--bg-elevated:#F0EDE8;--bg-card:#FFFFFF;--text-primary:#2D2A26;--text-secondary:#6B6560;--text-tertiary:#9A948E;--accent-primary:#C8B8DB;--accent-secondary:#E8D5C4;--accent-rose:#E8C4C4;--accent-sage:#C4D4C4;--accent-peach:#F5D5C4;--accent-sun:#F5E6C4;--accent-moon:#D4D4E8;--border-color:#E8E4DF;--shadow-sm:0 1px 3px rgba(45,42,38,0.06);--shadow-md:0 4px 12px rgba(45,42,38,0.08);--shadow-lg:0 8px 24px rgba(45,42,38,0.12);--danger:#E07070;--success:#70B870;--warning:#E8B070;--font-h1:clamp(28px,8vw,48px);--font-h2:clamp(22px,6vw,36px);--font-h3:clamp(18px,5vw,26px);--font-h4:clamp(16px,4.5vw,22px);--font-body:clamp(14px,4vw,16px);--font-sm:clamp(12px,3vw,14px);--font-xs:clamp(10px,2.5vw,12px);--spacing-xs:4px;--spacing-sm:8px;--spacing-md:16px;--spacing-lg:24px;--spacing-xl:32px;--spacing-2xl:48px;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;--radius-full:9999px;--transition-fast:0.15s ease;--transition-normal:0.25s ease;--transition-slow:0.4s ease;--z-screen:10;--z-nav:50;--z-modal:100;--z-toast:200;--z-skip:10000}

#app{position:relative;width:100%;max-width:430px;min-height:100vh;min-height:100dvh;margin:0 auto;background:var(--bg-primary);color:var(--text-primary);overflow:hidden;transition:background-color var(--transition-normal),color var(--transition-normal)}

.btn-primary{display:inline-flex;align-items:center;justify-content:center;padding:14px 28px;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));color:#fff;font-size:var(--font-body);font-weight:600;border:none;border-radius:var(--radius-xl);cursor:pointer;transition:all var(--transition-fast);width:100%;text-align:center;touch-action:manipulation;min-height:48px}

.btn-text{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;background:transparent;color:var(--text-secondary);font-size:var(--font-body);font-weight:500;border:none;border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition-fast);touch-action:manipulation;min-height:44px}

#home{padding-top:max(20px,env(safe-area-inset-top))}

.gradient-lavender{background:linear-gradient(135deg,#C8B8DB,#B8A8D0)}
